services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: lavaja-rabbitmq
    ports:
      - "5672:5672"     # AMQP — usado pelo backend (amqplib)
      - "15672:15672"   # Management UI — http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: lavaja
      RABBITMQ_DEFAULT_PASS: lavaja123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
